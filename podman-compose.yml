version: '3.8'

services:
  user-db:
    image: docker.io/library/postgres:16-alpine
    container_name: user-service-db
    environment:
      POSTGRES_USER: user_service_admin
      POSTGRES_PASSWORD: user_service_pwd
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - ./volumes/user_db_data:/var/lib/postgresql/data:Z
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_service_admin -d user_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
  thread-db:
    image: docker.io/library/postgres:16-alpine
    container_name: thread-service-db
    environment:
      POSTGRES_USER: thread_service_admin
      POSTGRES_PASSWORD: thread_service_pwd
      POSTGRES_DB: thread_db
    ports:
      - "5434:5432"
    volumes:
      - ./volumes/thread_db_data:/var/lib/postgresql/data:Z
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U thread_service_admin -d thread_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  user_db_data:
  thread_db_data:
